# WLED Preset Selector - Nativer YAML Modus (21 Presets)
esphome:
  on_boot:
    - priority: 655
      then:
        - lambda: 'id(g_present)[7] = true;'

globals:
  - id: g_th_cur        
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: g_th_target     
    type: float
    restore_value: no
    initial_value: '1.0'
  - id: g_th_action     
    type: std::string
    restore_value: no
    initial_value: '"WLED"'
  - id: g_th_mode       
    type: std::string
    restore_value: no
    initial_value: '"Presets"'
  - id: g_th_hum        
    type: int
    restore_value: no
    initial_value: '-1'
  - id: g_th_min        
    type: float
    restore_value: no
    initial_value: '1.0'
  - id: g_th_max        
    type: float
    restore_value: no
    initial_value: '21.0'
  - id: g_th_step       
    type: float
    restore_value: no
    initial_value: '1.0'
  - id: g_th_pending    
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: g_th_lasttap    
    type: int
    restore_value: no
    initial_value: '0'

script:
  # Sendet das ausgewählte Preset nach 300ms nativ an Home Assistant
  - id: th_commit
    mode: restart
    then:
      - delay: 300ms
      - homeassistant.service:
          service: select.select_option
          data:
            entity_id: select.wled_lamelle_voreinstellung
            option: !lambda |-
              int idx = (int)id(g_th_target);
              if (idx == 1)  return std::string("Ambiente 1");
              if (idx == 2)  return std::string("Ambiente 2");
              if (idx == 3)  return std::string("Fun 1");
              if (idx == 4)  return std::string("Fun 2");
              if (idx == 5)  return std::string("Fun 3");
              if (idx == 6)  return std::string("Fun 4");
              if (idx == 7)  return std::string("Fun 5");
              if (idx == 8)  return std::string("Meteor Ambiente");
              if (idx == 9)  return std::string("Music 1");
              if (idx == 10) return std::string("Music 2");
              if (idx == 11) return std::string("Music 3");
              if (idx == 12) return std::string("Music 4");
              if (idx == 13) return std::string("Music 5");
              if (idx == 14) return std::string("Music 6");
              if (idx == 15) return std::string("Music 7");
              if (idx == 16) return std::string("Music 8");
              if (idx == 17) return std::string("Pixelwave Ambiente");
              if (idx == 18) return std::string("Rain");
              if (idx == 19) return std::string("Washing Machine Ambiente");
              if (idx == 20) return std::string("Waterfall Ambiente");
              if (idx == 21) return std::string("Waterfall up and down");
              return std::string("");
      - lambda: 'id(g_th_pending) = false;'

  - id: th_render
    then:
      - lvgl.label.update:
          id: th_target
          text: !lambda |-
            int idx = (int)id(g_th_target);
            if (idx == 1)  return std::string("Amb. 1");
            if (idx == 2)  return std::string("Amb. 2");
            if (idx == 3)  return std::string("Fun 1");
            if (idx == 4)  return std::string("Fun 2");
            if (idx == 5)  return std::string("Fun 3");
            if (idx == 6)  return std::string("Fun 4");
            if (idx == 7)  return std::string("Fun 5");
            if (idx == 8)  return std::string("Meteor");
            if (idx == 9)  return std::string("Music 1");
            if (idx == 10) return std::string("Music 2");
            if (idx == 11) return std::string("Music 3");
            if (idx == 12) return std::string("Music 4");
            if (idx == 13) return std::string("Music 5");
            if (idx == 14) return std::string("Music 6");
            if (idx == 15) return std::string("Music 7");
            if (idx == 16) return std::string("Music 8");
            if (idx == 17) return std::string("Pixelw.");
            if (idx == 18) return std::string("Rain");
            if (idx == 19) return std::string("Washing");
            if (idx == 20) return std::string("Waterf.");
            if (idx == 21) return std::string("Wat. U/D");
            return std::string("--");
      - lvgl.label.update: { id: th_cur, text: "Wählen..." }
      - lvgl.arc.update:
          id: th_arc
          value: !lambda 'return (int)(100L * (id(g_th_target) - 1) / 20);'
      - lvgl.label.update: { id: th_action, text: "EFFEKTE", text_color: 0x2FE6CF }
      - lvgl.label.update: { id: th_mode, text: "Lamellen", text_color: 0x9FC7BE }

sensor: []
text_sensor: []

interval:
  - interval: 50ms
    then:
      - if:
          condition: { lambda: 'return id(g_nav_req) && id(g_base)==7;' }
          then:
            - lambda: 'id(g_nav_req) = false; id(g_knob_capture) = true; id(g_th_lasttap) = id(g_tap_seq);'
            - if: { condition: { lambda: 'return id(g_nav_anim)==0;' }, then: [lvgl.page.show: { id: page_thermostat, animation: move_left,   time: 250ms }] }
            - if: { condition: { lambda: 'return id(g_nav_anim)==1;' }, then: [lvgl.page.show: { id: page_thermostat, animation: move_right,  time: 250ms }] }
            - if: { condition: { lambda: 'return id(g_nav_anim)==2;' }, then: [lvgl.page.show: { id: page_thermostat, animation: move_top,    time: 250ms }] }
            - if: { condition: { lambda: 'return id(g_nav_anim)==3;' }, then: [lvgl.page.show: { id: page_thermostat, animation: move_bottom, time: 250ms }] }
            - script.execute: th_render
            
  - interval: 120ms
    then:
      - if:
          condition: { lambda: 'return id(g_base)==7 && id(g_knob_delta) != 0;' }
          then:
            - lambda: |-
                id(g_th_target) += id(g_knob_delta) * id(g_th_step);
                id(g_knob_delta) = 0;
                if (id(g_th_target) < id(g_th_min)) id(g_th_target) = id(g_th_min);
                if (id(g_th_target) > id(g_th_max)) id(g_th_target) = id(g_th_max);
                id(g_th_pending) = true;
            - script.execute: th_commit
            - script.execute: th_render
            
      - if:
          condition: { lambda: 'return id(g_base)==7 && id(g_tap_seq) != id(g_th_lasttap);' }
          then:
            - lambda: 'id(g_th_lasttap) = id(g_tap_seq);'
            - homeassistant.service:
                service: light.toggle
                data:
                  entity_id: light.wled_lamelle_haupt

lvgl:
  pages:
    - id: page_thermostat
      bg_color: 0x0B1020
      widgets:
        - arc:
            id: th_arc
            align: CENTER
            width: 300
            height: 300
            arc_width: 12
            adjustable: false
            min_value: 0
            max_value: 100
            value: 0
            start_angle: 135
            end_angle: 45
            arc_color: 0x21304A
            indicator:
              arc_color: 0x2FE6CF
              arc_width: 12
        - label: { id: th_action, align: CENTER, y: -86, text: "EFFEKTE", text_font: font_artist, text_color: 0x2FE6CF }
        - label: { id: th_target, align: CENTER, y: -14, text: "--", text_font: montserrat_28, text_color: 0xFFFFFF }
        - label: { id: th_cur, align: CENTER, y: 30, text: "Wählen...", text_font: font_med, text_color: 0x9FC7BE }
        - label: { id: th_hum, align: CENTER, y: 58, text: "", text_font: font_artist, text_color: 0x3FA9D6, hidden: true }
        - label: { id: th_mode, align: CENTER, y: 92, text: "Lamellen", text_font: font_artist, text_color: 0xCFEAE4 }
