# Farbsteuerungs-Screen mit optimaler Raumaufteilung im Zentrum
esphome:
  on_boot:
    - priority: 650
      then:
        - lambda: 'id(g_present)[10] = true;'

globals:
  - id: g_cw_hue
    type: uint16_t
    restore_value: no
    initial_value: '0'
  - id: g_cw_lasttap
    type: int
    restore_value: no
    initial_value: '0'

script:
  - id: cw_commit
    mode: restart
    then:
      - delay: 400ms
      - homeassistant.service:
          service: light.turn_on
          data:
            entity_id: light.wohnung_bunt
            hs_color: !lambda |-
              auto* cw = (lv_obj_t*) id(my_colorwheel).get_obj();
              lv_color_hsv_t hsv = lv_colorwheel_get_hsv(cw);
              char buf[32];
              sprintf(buf, "[%d, %d]", hsv.h, hsv.s);
              return std::string(buf);
            brightness_pct: !lambda |-
              auto* sl = (lv_obj_t*) id(brightness_slider).get_obj();
              int pct = lv_slider_get_value(sl);
              return std::to_string(pct);
            color_temp_kelvin: !lambda |-
              auto* sl = (lv_obj_t*) id(temp_slider).get_obj();
              int kelvin = lv_slider_get_value(sl);
              return std::to_string(kelvin);

  - id: cw_render
    then:
      - lambda: |-
          auto* cw = (lv_obj_t*) id(my_colorwheel).get_obj();
          lv_color_hsv_t hsv = lv_colorwheel_get_hsv(cw);
          hsv.h = id(g_cw_hue);
          hsv.s = 100; 
          hsv.v = 100; 
          lv_colorwheel_set_hsv(cw, hsv);

interval:
  - interval: 50ms
    then:
      - if:
          condition: { lambda: 'return id(g_nav_req) && id(g_base)==10;' }
          then:
            - lambda: 'id(g_nav_req) = false; id(g_knob_capture) = true; id(g_th_lasttap) = id(g_tap_seq);'
            - lvgl.page.show: { id: page_colorwheel, animation: move_left, time: 250ms }
            - script.execute: cw_render

  - interval: 80ms
    then:
      - if:
          condition: { lambda: 'return id(g_base)==10 && id(g_knob_delta) != 0;' }
          then:
            - lambda: |-
                int16_t new_hue = (int16_t)id(g_cw_hue) + (id(g_knob_delta) * 4);
                id(g_knob_delta) = 0;
                if (new_hue >= 360) new_hue -= 360;
                if (new_hue < 0) new_hue += 360;
                id(g_cw_hue) = (uint16_t)new_hue;
            - script.execute: cw_render
            - script.execute: cw_commit

      - if:
          condition: { lambda: 'return id(g_base)==10 && id(g_tap_seq) != id(g_th_lasttap);' }
          then:
            - lambda: 'id(g_th_lasttap) = id(g_tap_seq);'
            - homeassistant.service:
                service: light.toggle
                data:
                  entity_id: light.wohnung_bunt

lvgl:
  pages:
    - id: page_colorwheel
      bg_color: 0x000000     
      widgets:
        # 360° FARBRAD AM ÄUSSERSTEN ANTENNENRAND
        - colorwheel:
            id: my_colorwheel
            align: CENTER
            width: 360       
            height: 360      
            adjustable: false 

        # --- OBERE SYMMETRIE-HÄLFTE: HELLIGKEIT ---
        - slider:
            id: brightness_slider
            align: CENTER
            x: 10            # Leicht nach rechts versetzt, um Platz für das MDI-Icon links zu machen
            y: -25           # Im oberen Teil des Innenkreises
            width: 150       # Schmaler, da der Kreis hier enger wird
            height: 14       
            min_value: 1
            max_value: 100
            value: 80        
            bg_color: 0x1A1A26  
            indicator:
              bg_color: 0xFFFFFF 
            knob:
              bg_color: 0xEEEEEE
            on_value_changed:
              - script.execute: cw_commit

        - label:
            align: CENTER
            x: -80           # Exakt links neben dem Helligkeits-Slider platziert
            y: -25
            text: "\U000f0335" # MDI-Icon für Glühbirne/Helligkeit
            text_font: font_artist
            text_color: 0x888888

        # --- UNTERE SYMMETRIE-HÄLFTE: FARBTEMPERATUR ---
        - slider:
            id: temp_slider
            align: CENTER
            x: 10            
            y: 25            # Im unteren Teil des Innenkreises
            width: 150       # Gleiche Breite wie oben für perfekte visuelle Symmetrie
            height: 14       
            min_value: 2700  
            max_value: 6500  
            value: 4000      
            bg_color: 0xFFB060  # Warmweiß-Verlauf-Basis
            indicator:
              bg_color: 0xD0E0FF # Kaltweiß-Indikator
            knob:
              bg_color: 0xFFFFFF
            on_value_changed:
              - script.execute: cw_commit

        - label:
            align: CENTER
            x: -80           # Exakt links neben dem Temperatur-Slider platziert
            y: 25
            text: "\U000f050f" # MDI-Icon für Thermometer/Farbtemperatur
            text_font: font_artist
            text_color: 0x888888
