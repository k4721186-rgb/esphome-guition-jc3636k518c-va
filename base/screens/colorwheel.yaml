# Farbsteuerungs-Screen für LVGL 9 (Sicher vor unvollständigen Typen)
globals:
  - id: g_cw_hue
    type: uint16_t
    restore_value: no
    initial_value: '0'
  - id: g_cw_lasttap
    type: int
    restore_value: no
    initial_value: '0'

script:
  - id: cw_render
    then:
      - lambda: |-
          ESP_LOGD("colorwheel", "Farbton aktualisiert: %d°", id(g_cw_hue));

  - id: cw_commit
    mode: restart
    then:
      - delay: 400ms
      - homeassistant.service:
          service: light.turn_on
          data:
            entity_id: light.wohnung_bunt
            hs_color: !lambda |-
              char buf[32];
              sprintf(buf, "[%d, 100]", id(g_cw_hue));
              return std::string(buf);
            brightness_pct: !lambda |-
              // KORREKTUR: Nutzung der sicheren ESPHome .get_value() Methode
              return std::to_string((int)id(brightness_slider).get_value());
            color_temp_kelvin: !lambda |-
              // KORREKTUR: Nutzung der sicheren ESPHome .get_value() Methode
              return std::to_string((int)id(temp_slider).get_value());

interval:
  - interval: 50ms
    then:
      - if:
          condition: { lambda: 'return id(g_nav_req) && id(g_base)==10;' }
          then:
            - lambda: |-
                id(g_nav_req) = false; 
                id(g_knob_capture) = true; 
                id(g_cw_lasttap) = id(g_tap_seq);
            - lvgl.page.show: { id: page_colorwheel, animation: move_left, time: 250ms }
            - script.execute: cw_render

  - interval: 80ms
    then:
      - if:
          condition: { lambda: 'return id(g_base)==10 && id(g_knob_delta) != 0;' }
          then:
            - lambda: |-
                int16_t new_hue = (int16_t)id(g_cw_hue) + (id(g_knob_delta) * 4);
                id(g_knob_delta) = 0;
                if (new_hue >= 360) new_hue -= 360;
                if (new_hue < 0) new_hue += 360;
                id(g_cw_hue) = (uint16_t)new_hue;
            - script.execute: cw_render
            - script.execute: cw_commit

      - if:
          condition: { lambda: 'return id(g_base)==10 && id(g_tap_seq) != id(g_cw_lasttap);' }
          then:
            - lambda: 'id(g_cw_lasttap) = id(g_tap_seq);'
            - homeassistant.service:
                service: light.toggle
                data:
                  entity_id: light.wohnung_bunt

lvgl:
  pages:
    - id: page_colorwheel
      bg_color: 0x000000
      widgets:
        - slider:
            id: brightness_slider
            align: CENTER
            x: 10            
            y: -25           
            width: 150       
            height: 14       
            min_value: 1
            max_value: 100
            value: 80        
            bg_color: 0x1A1A26  
            indicator:
              bg_color: 0xFFFFFF 
            knob:
              bg_color: 0xEEEEEE
            on_value:
              - script.execute: cw_commit

        - label:
            align: CENTER
            x: -80           
            y: -25
            text: "\U000f0335" 
            text_font: font_artist
            text_color: 0x888888

        - slider:
            id: temp_slider
            align: CENTER
            x: 10            
            y: 25            
            width: 150       
            height: 14       
            min_value: 2700  
            max_value: 6500  
            value: 4000      
            bg_color: 0xFFB060  
            indicator:
              bg_color: 0xD0E0FF 
            knob:
              bg_color: 0xFFFFFF
            on_value:
              - script.execute: cw_commit

        - label:
            align: CENTER
            x: -80           
            y: 25
            text: "\U000f050f" 
            text_font: font_artist
            text_color: 0x888888
