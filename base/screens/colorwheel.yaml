# Farbsteuerungs-Screen für LVGL 9 mit echtem, runden Farbrad (Riesen-Regenbogen-Edition)
globals:
  - id: g_cw_hue
    type: uint16_t
    restore_value: no
    initial_value: '0'
  - id: g_cw_lasttap
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_cw_brightness
    type: int
    restore_value: no
    initial_value: '80'
  - id: g_cw_temp
    type: int
    restore_value: no
    initial_value: '4000'

script:
  - id: cw_render
    then:
      - lambda: |-
          // Vorwärtsdeklaration für den C++ Compiler, damit er nicht meckert
          struct _lv_obj_t;
          typedef struct _lv_obj_t lv_obj_t;
          
          // Zugriff über die offizielle ESPHome-Methode
          if (id(cw_arc) != nullptr) {
            auto* arc_obj = id(cw_arc)->get_obj();
            
            // Verwendet die interne ESPHome-Zuweisung um den C-Befehl zu umgehen
            id(cw_arc)->set_value(id(g_cw_hue));
            ESP_LOGD("colorwheel", "Farbton aktualisiert: %d°", id(g_cw_hue));
          }
  - id: cw_commit
    mode: restart
    then:
      - delay: 400ms
      - homeassistant.service:
          service: light.turn_on
          data:
            entity_id: light.wohnung_bunt
            # Verwandelt das Array in einen sauberen String, den ESPHome fehlerfrei schluckt:
            hs_color: !lambda |-
              int ha_hue = (int)id(g_cw_hue) + 90;
              if (ha_hue >= 360) ha_hue -= 360;
              return "[" + std::to_string(ha_hue) + ", 100]";
            brightness_pct: !lambda |-
              return std::to_string(id(g_cw_brightness));
            color_temp_kelvin: !lambda |-
              return std::to_string(id(g_cw_temp));

interval:
  - interval: 50ms
    then:
      - if:
          condition: { lambda: 'return id(g_nav_req) && id(g_base)==3;' }
          then:
            - lambda: |-
                id(g_nav_req) = false; 
                id(g_knob_capture) = true; 
                id(g_cw_lasttap) = id(g_tap_seq);
                id(g_base) = 3; 
            - lvgl.page.show: { id: page_colorwheel, animation: move_left, time: 250ms }
            - script.execute: cw_render

  - interval: 80ms
    then:
      - if:
          condition: { lambda: 'return id(g_base)==3 && id(g_knob_delta) != 0;' }
          then:
            - lambda: |-
                // Drehen am Rad verändert den Farbton im 360-Grad-Kreis
                int16_t new_hue = (int16_t)id(g_cw_hue) + (id(g_knob_delta) * 6);
                id(g_knob_delta) = 0;
                if (new_hue >= 360) new_hue -= 360;
                if (new_hue < 0) new_hue += 360;
                id(g_cw_hue) = (uint16_t)new_hue;
            - script.execute: cw_render
            - script.execute: cw_commit

      - if:
          condition: { lambda: 'return id(g_base)==3 && id(g_tap_seq) != id(g_cw_lasttap);' }
          then:
            - lambda: 'id(g_cw_lasttap) = id(g_tap_seq);'
            - homeassistant.service:
                service: light.toggle
                data:
                  entity_id: light.wohnung_bunt

lvgl:
  pages:
    - id: page_colorwheel
      bg_color: 0x05070B # Ultra-Deep Black für maximalen Kontrast der LEDs
      widgets:
        # --- DAS RUNDE, FÜLLENDE REGENBOGEN-FARBRAD ---
        - arc:
            id: cw_arc
            align: CENTER
            x: 0
            y: -15  
            width: 260   # Nutzt fast das gesamte 360x360 Display aus
            height: 260  
            min_value: 0
            max_value: 360
            value: 0
            start_angle: 0
            end_angle: 360
            line_width: 24 # Richtig schön breiter, fetter Ring
            bg_color: 0x111827 # Dunkler Untergrund für nicht aktive Segmente
            
            # Farbverlauf-Konfiguration für echtes Regenbogen-Feeling
            grad_color: 0xFF0000 
            indicator:
              bg_color: 0x00FF00 
              grad_color: 0x0000FF 
            
            knob:
              bg_color: 0xFFFFFF # Markanter, weißer Auswahl-Knopf
              width: 28
              height: 28

        # --- HELLIGKEITS-LABEL & SLIDER ---
        - label:
            align: CENTER
            x: 0           
            y: 85 
            text: "Helligkeit"
            text_color: 0x64748B

        - slider:
            id: brightness_slider
            align: CENTER
            x: 0            
            y: 110           
            width: 140       
            height: 10 
            min_value: 1
            max_value: 100
            value: 80        
            bg_color: 0x1E293B  
            indicator:
              bg_color: 0x38BDF8 # Schickes Cyan für den Helligkeitsbalken
            knob:
              bg_color: 0xFFFFFF 
              width: 16
              height: 16
            on_value:
              then:
                - lambda: 'id(g_cw_brightness) = (int)x;'
                - script.execute: cw_commit
