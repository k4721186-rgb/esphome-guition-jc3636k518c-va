# Farbsteuerungs-Screen - Clean-Version ohne fehlerhafte Widgets
esphome:
  on_boot:
    - priority: 650
      then:
        - lambda: 'id(g_present)[10] = true;'

globals:
  - id: g_cw_hue
    type: uint16_t
    restore_value: no
    initial_value: '0'
  - id: g_cw_lasttap
    type: int
    restore_value: no
    initial_value: '0'

script:
  - id: cw_commit
    mode: restart
    then:
      - delay: 400ms
      - homeassistant.service:
          service: light.turn_on
          data:
            entity_id: light.wohnung_bunt
            hs_color: !lambda |-
              // Holt das Farbrad aus der Page (es ist das erste Kind-Element, Index 0)
              auto* page_obj = (lv_obj_t*) id(page_colorwheel).get_obj();
              auto* cw = lv_obj_get_child(page_obj, 0);
              if (cw == nullptr) return std::string("[0, 100]");
              lv_color_hsv_t hsv = lv_colorwheel_get_hsv(cw);
              char buf[32];
              sprintf(buf, "[%d, %d]", hsv.h, hsv.s);
              return std::string(buf);
            brightness_pct: !lambda |-
              auto* sl = (lv_obj_t*) id(brightness_slider).get_obj();
              int pct = lv_slider_get_value(sl);
              return std::to_string(pct);
            color_temp_kelvin: !lambda |-
              auto* sl = (lv_obj_t*) id(temp_slider).get_obj();
              int kelvin = lv_slider_get_value(sl);
              return std::to_string(kelvin);

  - id: cw_render
    then:
      - lambda: |-
          auto* page_obj = (lv_obj_t*) id(page_colorwheel).get_obj();
          auto* cw = lv_obj_get_child(page_obj, 0);
          if (cw != nullptr) {
              lv_color_hsv_t hsv = lv_colorwheel_get_hsv(cw);
              hsv.h = id(g_cw_hue);
              hsv.s = 100; 
              hsv.v = 100; 
              lv_colorwheel_set_hsv(cw, hsv);
          }

interval:
  - interval: 50ms
    then:
      - if:
          condition: { lambda: 'return id(g_nav_req) && id(g_base)==10;' }
          then:
            - lambda: 'id(g_nav_req) = false; id(g_knob_capture) = true; id(g_cw_lasttap) = id(g_tap_seq);'
            - lvgl.page.show: { id: page_colorwheel, animation: move_left, time: 250ms }
            - script.execute: cw_render

  - interval: 80ms
    then:
      - if:
          condition: { lambda: 'return id(g_base)==10 && id(g_knob_delta) != 0;' }
          then:
            - lambda: |-
                int16_t new_hue = (int16_t)id(g_cw_hue) + (id(g_knob_delta) * 4);
                id(g_knob_delta) = 0;
                if (new_hue >= 360) new_hue -= 360;
                if (new_hue < 0) new_hue += 360;
                id(g_cw_hue) = (uint16_t)new_hue;
            - script.execute: cw_render
            - script.execute: cw_commit

      - if:
          condition: { lambda: 'return id(g_base)==10 && id(g_tap_seq) != id(g_cw_lasttap);' }
          then:
            - lambda: 'id(g_cw_lasttap) = id(g_tap_seq);'
            - homeassistant.service:
                service: light.toggle
                data:
                  entity_id: light.wohnung_bunt

# Das visuelle Layout in LVGL
lvgl:
  pages:
    - id: page_colorwheel
      bg_color: 0x000000
      # on_show wird nativ von Pages unterstützt und knallt im YAML-Parser nicht!
      on_show:
        - lambda: |-
            auto* page_obj = (lv_obj_t*) id(page_colorwheel).get_obj();
            // Erstellt das Farbrad nur, wenn noch kein Kind-Element existiert
            if (lv_obj_get_child_cnt(page_obj) == 0) {
                auto* cw = lv_colorwheel_create(page_obj, true);
                lv_obj_set_size(cw, 360, 360);
                lv_obj_align(cw, LV_ALIGN_CENTER, 0, 0);
                // Schiebt das Farbrad im Hintergrund nach ganz hinten, damit die Slider sichtbar bleiben
                lv_obj_move_background(cw);
            }
      widgets:
        # --- OBERE SYMMETRIE-HÄLFTE: HELLIGKEIT ---
        - slider:
            id: brightness_slider
            align: CENTER
            x: 10            
            y: -25           
            width: 150       
            height: 14       
            min_value: 1
            max_value: 100
            value: 80        
            bg_color: 0x1A1A26  
            indicator:
              bg_color: 0xFFFFFF 
            knob:
              bg_color: 0xEEEEEE
            on_value_changed:
              - script.execute: cw_commit

        - label:
            align: CENTER
            x: -80           
            y: -25
            text: "\U000f0335" 
            text_font: font_artist
            text_color: 0x888888

        # --- UNTERE SYMMETRIE-HÄLFTE: FARBTEMPERATUR ---
        - slider:
            id: temp_slider
            align: CENTER
            x: 10            
            y: 25            
            width: 150       
            height: 14       
            min_value: 2700  
            max_value: 6500  
            value: 4000      
            bg_color: 0xFFB060  
            indicator:
              bg_color: 0xD0E0FF 
            knob:
              bg_color: 0xFFFFFF
            on_value_changed:
              - script.execute: cw_commit

        - label:
            align: CENTER
            x: -80           
            y: 25
            text: "\U000f050f" 
            text_font: font_artist
            text_color: 0x888888

