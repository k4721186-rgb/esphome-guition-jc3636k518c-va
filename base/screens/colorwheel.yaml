# Farbsteuerungs-Screen für LVGL 9 mit echtem, runden Farbrad
globals:
  - id: g_cw_hue
    type: uint16_t
    restore_value: no
    initial_value: '0'
  - id: g_cw_lasttap
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_cw_brightness
    type: int
    restore_value: no
    initial_value: '80'
  - id: g_cw_temp
    type: int
    restore_value: no
    initial_value: '4000'

script:
  - id: cw_render
    then:
      - lambda: |-
          // Holt das native LVGL-Objekt über die offizielle ESPHome-Methode
          if (id(cw_arc) != nullptr) {
            auto* arc_obj = id(cw_arc)->get_obj();
            lv_arc_set_value(arc_obj, id(g_cw_hue));
            ESP_LOGD("colorwheel", "Farbton aktualisiert: %d°", id(g_cw_hue));
          }


  - id: cw_commit
    mode: restart
    then:
      - delay: 400ms
      - homeassistant.service:
          service: light.turn_on
          data:
            entity_id: light.wohnung_bunt
            hs_color: !lambda |-
              char buf[32];
              sprintf(buf, "[%d, 100]", id(g_cw_hue));
              return std::string(buf);
            brightness_pct: !lambda |-
              return std::to_string(id(g_cw_brightness));
            color_temp_kelvin: !lambda |-
              return std::to_string(id(g_cw_temp));

interval:
  - interval: 50ms
    then:
      - if:
          condition: { lambda: 'return id(g_nav_req) && id(g_base)==3;' }
          then:
            - lambda: |-
                id(g_nav_req) = false; 
                id(g_knob_capture) = true; 
                id(g_cw_lasttap) = id(g_tap_seq);
                id(g_base) = 3; 
            - lvgl.page.show: { id: page_colorwheel, animation: move_left, time: 250ms }
            - script.execute: cw_render

  - interval: 80ms
    then:
      - if:
          condition: { lambda: 'return id(g_base)==3 && id(g_knob_delta) != 0;' }
          then:
            - lambda: |-
                // Drehen am Rad verändert den Farbton im 360-Grad-Kreis
                int16_t new_hue = (int16_t)id(g_cw_hue) + (id(g_knob_delta) * 6);
                id(g_knob_delta) = 0;
                if (new_hue >= 360) new_hue -= 360;
                if (new_hue < 0) new_hue += 360;
                id(g_cw_hue) = (uint16_t)new_hue;
            - script.execute: cw_render
            - script.execute: cw_commit

      - if:
          condition: { lambda: 'return id(g_base)==3 && id(g_tap_seq) != id(g_cw_lasttap);' }
          then:
            - lambda: 'id(g_cw_lasttap) = id(g_tap_seq);'
            - homeassistant.service:
                service: light.toggle
                data:
                  entity_id: light.wohnung_bunt

lvgl:
  pages:
    - id: page_colorwheel
      bg_color: 0x0A0F19 # Ein edles, tiefes Dunkelblau als Hintergrund
      widgets:
        # --- DAS RUNDE 360° FARBRAD (ARC) ---
        - arc:
            id: cw_arc
            align: CENTER
            x: 0
            y: -25  # Nach oben verschoben, um unten Platz für den Regler zu machen
            width: 140
            height: 140
            min_value: 0
            max_value: 360
            value: 0
            start_angle: 0
            end_angle: 360
            line_width: 12
            bg_color: 0x1E293B # Moderner, dunkelgrauer Ring im Ruhezustand
            indicator:
              bg_color: 0x38BDF8 # Schönes Cyan, das optisch mitwandert
            knob:
              bg_color: 0xFFFFFF # Weißer, gut sichtbarer Positionsknopf

        # --- TEXT & SLIDER FÜR HELLIGKEIT ---
        - label:
            align: CENTER
            x: 0           
            y: 55 # Direkt über dem Schieberegler platziert
            text: "Helligkeit"
            text_color: 0x94A3B8 # Dezent lesbares Graublau

        - slider:
            id: brightness_slider
            align: CENTER
            x: 0            
            y: 75           
            width: 160       
            height: 12 # Angenehme Stärke für das UI
            min_value: 1
            max_value: 100
            value: 80        
            bg_color: 0x1E293B  
            indicator:
              bg_color: 0xE2E8F0 # Cleaner, heller Füllbalken
            knob:
              bg_color: 0xFFFFFF # Kontrastreicher Regelknopf
            on_value:
              then:
                - lambda: 'id(g_cw_brightness) = (int)x;'
                - script.execute: cw_commit
