# Farbsteuerungs-Screen mit 9 vordefinierten Farbkacheln & Helligkeits-Drehrad
globals:
  - id: g_cw_lasttap
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_cw_brightness
    type: int
    restore_value: yes
    initial_value: '80'

script:
  - id: cw_render
    then:
      - lvgl.slider.update:
          id: cw_bright_slider
          value: !lambda "return id(g_cw_brightness);"
      - lvgl.label.update:
          id: cw_bright_label
          text: !lambda |-
            return std::to_string(id(g_cw_brightness)) + "%";

  - id: cw_commit_brightness
    mode: restart
    then:
      - delay: 150ms
      - homeassistant.action:
          action: light.turn_on
          data:
            entity_id: light.wohnung_bunt
            brightness_pct: !lambda "return std::to_string(id(g_cw_brightness));"

interval:
  # 1. Screen-Aktivierung bei Navigation
  - interval: 50ms
    then:
      - if:
          condition: { lambda: 'return id(g_nav_req) && id(g_base)==3;' }
          then:
            - lambda: |-
                id(g_nav_req) = false; 
                id(g_knob_capture) = true; 
                id(g_cw_lasttap) = id(g_tap_seq);
                id(g_base) = 3; 
            - lvgl.page.show: { id: page_colorwheel, animation: move_left, time: 250ms }
            - script.execute: cw_render

  # 2. Drehknopf steuert die Helligkeit
  - interval: 60ms
    then:
      - if:
          condition: { lambda: 'return id(g_base)==3 && id(g_knob_delta) != 0;' }
          then:
            - lambda: |-
                int new_bright = id(g_cw_brightness) + (id(g_knob_delta) * 4);
                id(g_knob_delta) = 0;
                if (new_bright > 100) new_bright = 100;
                if (new_bright < 5) new_bright = 5;
                id(g_cw_brightness) = new_bright;
            - script.execute: cw_render
            - script.execute: cw_commit_brightness

      # 3. Klick auf den Drehknopf schaltet das Licht komplett an/aus
      - if:
          condition: { lambda: 'return id(g_base)==3 && id(g_tap_seq) != id(g_cw_lasttap);' }
          then:
            - lambda: 'id(g_cw_lasttap) = id(g_tap_seq);'
            - homeassistant.action:
                action: light.toggle
                data:
                  entity_id: light.wohnung_bunt

lvgl:
  pages:
    - id: page_colorwheel
      bg_color: 0x0A0F1D
      widgets:
        
        # --- ZENTRALE HELLIGKEITSANZEIGE ---
        - label:
            id: cw_bright_label
            align: CENTER
            x: 0
            y: -120
            text: "80%"
            text_color: 0xF8FAFC
            text_font: font_med

        - slider:
            id: cw_bright_slider
            align: CENTER
            x: 0
            y: -105
            width: 120
            height: 6
            min_value: 5
            max_value: 100
            value: 80
            clickable: false
            bg_color: 0x1E293B
            indicator:
              bg_color: 0x38BDF8
            knob:
              width: 0
              height: 0

        # --- DAS 3x3 FARB-GRID (9 KNÖPFE) ---
        
        # Zeile 1: Lichttemperaturen (Kalt, Tageslicht, Warm)
        - button:
            align: CENTER
            x: -75
            y: -50
            width: 60
            height: 40
            bg_color: 0xE0F2FE
            radius: 8
            on_click:
              - homeassistant.action:
                  action: light.turn_on
                  data:
                    entity_id: light.wohnung_bunt
                    color_temp_kelvin: "6500"
        - button:
            align: CENTER
            x: 0
            y: -50
            width: 60
            height: 40
            bg_color: 0xFFFBEB
            radius: 8
