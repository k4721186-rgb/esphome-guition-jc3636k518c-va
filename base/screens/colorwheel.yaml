# Farbsteuerungs-Screen für LVGL 9 mit echtem, runden Farbrad (Riesen-Regenbogen-Edition)
globals:
  - id: g_cw_hue
    type: uint16_t
    restore_value: no
    initial_value: '0'
  - id: g_cw_lasttap
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_cw_brightness
    type: int
    restore_value: no
    initial_value: '80'
  - id: g_cw_temp
    type: int
    restore_value: no
    initial_value: '4000'

script:
  - id: cw_render
    then:
      - lvgl.arc.update:
          id: cw_arc
          value: !lambda "return id(g_cw_hue);"
      - lambda: |-
          ESP_LOGD("colorwheel", "Farbton auf Display aktualisiert: %d°", id(g_cw_hue));

  - id: cw_commit
    mode: restart
    then:
      - delay: 400ms
      - homeassistant.service:
          service: light.turn_on
          data:
            entity_id: light.wohnung_bunt
            hs_color: !lambda |-
              int ha_hue = (int)id(g_cw_hue) + 90;
              if (ha_hue >= 360) ha_hue -= 360;
              return "[" + std::to_string(ha_hue) + ", 100]";
            brightness_pct: !lambda |-
              return std::to_string(id(g_cw_brightness));
            color_temp_kelvin: !lambda |-
              return std::to_string(id(g_cw_temp));

interval:
  - interval: 50ms
    then:
      - if:
          condition: { lambda: 'return id(g_nav_req) && id(g_base)==3;' }
          then:
            - lambda: |-
                id(g_nav_req) = false; 
                id(g_knob_capture) = true; 
                id(g_cw_lasttap) = id(g_tap_seq);
                id(g_base) = 3; 
            - lvgl.page.show: { id: page_colorwheel, animation: move_left, time: 250ms }
            - script.execute: cw_render

  - interval: 80ms
    then:
      - if:
          condition: { lambda: 'return id(g_base)==3 && id(g_knob_delta) != 0;' }
          then:
            - lambda: |-
                int16_t new_hue = (int16_t)id(g_cw_hue) + (id(g_knob_delta) * 6);
                id(g_knob_delta) = 0;
                if (new_hue >= 360) new_hue -= 360;
                if (new_hue < 0) new_hue += 360;
                id(g_cw_hue) = (uint16_t)new_hue;
            - script.execute: cw_render
            - script.execute: cw_commit

      - if:
          condition: { lambda: 'return id(g_base)==3 && id(g_tap_seq) != id(g_cw_lasttap);' }
          then:
            - lambda: 'id(g_cw_lasttap) = id(g_tap_seq);'
            - homeassistant.service:
                service: light.toggle
                data:
                  entity_id: light.wohnung_bunt

lvgl:
  pages:
    - id: page_colorwheel
      bg_color: 0x05070B 
      widgets:
        - arc:
            id: cw_arc
            align: CENTER
            x: 0
            y: -15  
            width: 260   
            height: 260  
            min_value: 0
            max_value: 360
            value: 0
            start_angle: 0
            end_angle: 360
            line_width: 24 
            bg_color: 0x111827 
            bg_grad_color: 0xFF0000 
            indicator:
              bg_color: 0x00FF00 
              bg_grad_color: 0x0000FF 
            knob:
              bg_color: 0xFFFFFF 
              width: 28
              height: 28

        - label:
            align: CENTER
            x: 0           
            y: 85 
            text: "Helligkeit"
            text_color: 0x64748B

        - slider:
            id: brightness_slider
            align: CENTER
            x: 0            
            y: 110           
            width: 140       
            height: 10 
            min_value: 1
            max_value: 100
            value: 80        
            bg_color: 0x1E293B  
            indicator:
              bg_color: 0x38BDF8 
            knob:
              bg_color: 0xFFFFFF 
              width: 16
              height: 16
            on_value:
              then:
                - lambda: 'id(g_cw_brightness) = (int)x;'
                - script.execute: cw_commit
