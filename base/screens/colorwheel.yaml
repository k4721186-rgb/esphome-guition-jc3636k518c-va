# Farbsteuerungs-Screen mit 9 vordefinierten Farbkacheln & Helligkeits-Drehrad
globals:
  - id: g_cw_lasttap    
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_scene_target     
    type: float
    restore_value: yes
    initial_value: '1.0'

script:
  # Triggert die ausgewählte Szene verzögert nach dem Drehen
  - id: cw_commit_brightness
    mode: restart
    then:
      - delay: 400ms
      - homeassistant.action:
          action: scene.turn_on
          data:
            entity_id: !lambda |-
              int idx = (int)id(g_scene_target);
              if (idx == 1) return std::string("scene.szenen_aus");
              if (idx == 2) return std::string("scene.ambiente_gemutlich");
              if (idx == 3) return std::string("scene.ambiente_musik");
              if (idx == 4) return std::string("scene.wohnung_rot");
              if (idx == 5) return std::string("scene.wohnung_orange");
              if (idx == 6) return std::string("scene.wohnung_blau");
              if (idx == 7) return std::string("scene.wohnung_grun");
              if (idx == 8) return std::string("scene.wohnung_lila");
              if (idx == 9) return std::string("scene.wohnung_tageslicht");
              return std::string("");

  # HIER WAR DER FEHLER: Jetzt korrekt als zweites Skript eingerückt!
  - id: cw_render
    then:
      - lvgl.label.update:
          id: cw_bright_label
          text: !lambda |-
            int idx = (int)id(g_scene_target);
            if (idx == 1) return std::string("Szenen Aus");
            if (idx == 2) return std::string("Gemütlich");
            if (idx == 3) return std::string("Musik");
            if (idx == 4) return std::string("Rot");
            if (idx == 5) return std::string("Orange");
            if (idx == 6) return std::string("Blau");
            if (idx == 7) return std::string("Grün");
            if (idx == 8) return std::string("Lila");
            if (idx == 9) return std::string("Tageslicht");
            return std::string("--");
      - lvgl.label.update:
          id: cw_icon_label
          text: !lambda |-
            int idx = (int)id(g_scene_target);
            if (idx == 1) return std::string("\U000f0a5f");
            if (idx == 2) return std::string("\U000f0732");
            if (idx == 3) return std::string("\U000f075a");
            if (idx == 4) return std::string("\U000f12c3");
            if (idx == 5) return std::string("\U000f12c3");
            if (idx == 6) return std::string("\U000f12c3");
            if (idx == 7) return std::string("\U000f12c3");
            if (idx == 8) return std::string("\U000f12c3");
            if (idx == 9) return std::string("\U000f059f");
            return std::string("");
      - lvgl.arc.update:
          id: cw_bright_slider
          value: !lambda 'return (int)(100L * (id(g_scene_target) - 1) / 8);'

interval:
  - interval: 50ms
    then:
      - if:
          condition: { lambda: 'return id(g_nav_req) && id(g_base)==3;' }
          then:
            - lambda: 'id(g_nav_req) = false; id(g_knob_capture) = true; id(g_cw_lasttap) = id(g_tap_seq);'
            - lvgl.page.show: { id: page_colorwheel, animation: move_left, time: 250ms }
            - script.execute: cw_render

  - interval: 120ms
    then:
      - if:
          condition: { lambda: 'return id(g_base)==3 && id(g_knob_delta) != 0;' }
          then:
            - lambda: |-
                id(g_scene_target) += id(g_knob_delta);
                id(g_knob_delta) = 0;
                if (id(g_scene_target) < 1.0) id(g_scene_target) = 1.0;
                if (id(g_scene_target) > 9.0) id(g_scene_target) = 9.0;
            - script.execute: cw_commit_brightness
            - script.execute: cw_render

      - if:
          condition: { lambda: 'return id(g_base)==3 && id(g_tap_seq) != id(g_cw_lasttap);' }
          then:
            - lambda: 'id(g_cw_lasttap) = id(g_tap_seq);'
            - script.execute: cw_commit_brightness

lvgl:
  pages:
    - id: page_colorwheel
      bg_color: 0x0B1020
      widgets:
        - arc:
            id: cw_bright_slider
            align: CENTER
            width: 300
            height: 300
            arc_width: 12
            adjustable: false
            min_value: 0
            max_value: 100
            value: 0
            start_angle: 135
            end_angle: 45
            arc_color: 0x21304A
            indicator:
              arc_color: 0xEC4899 
              arc_width: 12
        - label: { align: CENTER, y: -86, text: "SZENEN", text_font: font_artist, text_color: 0xEC4899 }
        - label: 
            id: cw_icon_label
            align: CENTER
            y: -36
            text: ""
            text_font: icons34
            text_color: 0xFFFFFF
        - label: 
            id: cw_bright_label
            align: CENTER
            y: 10
            text: "--"
            text_font: montserrat_24
            text_color: 0xFFFFFF
        - label: { align: CENTER, y: 46, text: "Wählen...", text_font: font_med, text_color: 0x9FC7BE }
        - label: { align: CENTER, y: 92, text: "Wohnung", text_font: font_artist, text_color: 0xCFF2EA }
