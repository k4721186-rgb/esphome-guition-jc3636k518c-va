# Media Player Advanced (Vinyl-Edition) für den Denon AVR-X1800H
globals:
  - id: g_mp_lasttap
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_mp_duration
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: g_mp_position
    type: float
    restore_value: no
    initial_value: '0.0'
  # --- HIER SIND DIE FEHLENDEN TEXT-IDS ---
  - id: g_player_album_art_url
    type: std::string
    restore_value: no
    initial_value: '""'

script:
  - id: mp_render
    then:
      # Erzwingt das Neuzeichnen des Fortschrittsrings über die native ESPHome-Action
      - lvgl.arc.update:
          id: mp_progress_arc
          value: !lambda |-
            if (id(g_mp_duration) > 0.0) {
              return (int)((id(g_mp_position) / id(g_mp_duration)) * 100.0);
            }
            return 0;

interval:
  # 1. Navigation und Aktivierung des Screens (Modus 1)
  - interval: 50ms
    then:
      - if:
          condition: { lambda: 'return id(g_nav_req) && id(g_base)==1;' }
          then:
            - lambda: |-
                id(g_nav_req) = false; 
                id(g_knob_capture) = true; 
                id(g_mp_lasttap) = id(g_tap_seq);
                id(g_base) = 1; 
            - lvgl.page.show: { id: page_mediaplayer_adv, animation: move_left, time: 250ms }
            - script.execute: mp_render

  # Reißt den Fortschrittsbalken jede Sekunde mit, wenn der Screen aktiv ist
  - interval: 1s
    then:
      - if:
          condition: { lambda: 'return id(g_base)==1;' }
          then:
            # Simuliert das Voranschreiten der Zeit lokal, falls HA nicht jede Sekunde funkt
            - lambda: |-
                if (id(g_mp_position) < id(g_mp_duration)) {
                  id(g_mp_position) += 1.0;
                }
            - script.execute: mp_render

  # 2. Knob-Drehung steuert die Lautstärke deines Denon AVR
  - interval: 80ms
    then:
      - if:
          condition: { lambda: 'return id(g_base)==1 && id(g_knob_delta) != 0;' }
          then:
            - homeassistant.service:
                service: >-
                  {% if id(g_knob_delta) > 0 %} media_player.volume_up {% else %} media_player.volume_down {% endif %}
                data:
                  entity_id: ${player_entity}
            - lambda: 'id(g_knob_delta) = 0;'

      # 3. Knob-Klick führt Play/Pause aus
      - if:
          condition: { lambda: 'return id(g_base)==1 && id(g_tap_seq) != id(g_mp_lasttap);' }
          then:
            - lambda: 'id(g_mp_lasttap) = id(g_tap_seq);'
            - homeassistant.service:
                service: media_player.media_play_pause
                data:
                  entity_id: ${player_entity}

lvgl:
  pages:
    - id: page_mediaplayer_adv
      bg_color: 0x0F172A # Edles Schiefer-Dunkelgrau
      widgets:

        # --- DER RADIALE PROGRESS-RING ---
        - arc:
            id: mp_progress_arc
            align: CENTER
            x: 0
            y: -20
            width: 170
            height: 170
            min_value: 0
            max_value: 100
            start_angle: 0
            end_angle: 360
            line_width: 6
            bg_color: 0x334155 
            indicator:
              bg_color: 0x10B981 
            knob:
              bg_color: 0x10B981
              width: 0 
              height: 0
            value: 0

        # --- DAS KREISRUNDE ALBUM-COVER (VINYL STYLING) ---
        - image:
            id: mp_album_art
            align: CENTER
            x: 0
            y: -20
            width: 140
            height: 140
            src: !lambda |-
              return "${ha_base_url}" + id(g_player_album_art_url); 

        # --- SONGTITEL ---
        - label:
            id: mp_title
            align: CENTER
            x: 0
            y: 75
            width: 220
            text: "Denon AVR..."
            text_color: 0xF8FAFC 
            long_mode: SCROLL_CIRCULAR 

        # --- INTERPRET ---
        - label:
            id: mp_artist
            align: CENTER
            x: 0
            y: 100
            width: 200
            text: "HEOS / Spotify"
            text_color: 0x94A3B8 
            long_mode: DOT
