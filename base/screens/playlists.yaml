# Playlist-Auswahl-Screen mit LVGL Roller Widget (Nativ & Fehlerfrei)
esphome:
  on_boot:
    - priority: 645
      then:
        - lambda: 'id(g_present)[11] = true;'

globals:
  - id: g_pl_index
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_pl_max
    type: int
    restore_value: no
    initial_value: '8' # 9 Playlists gesamt (0 bis 8)
  - id: g_pl_lasttap
    type: int
    restore_value: no
    initial_value: '0'

script:
  # --- MUSIC ASSISTANT PLAYLIST WIEDERGABE AUF DEM DENON ---
  - id: pl_commit
    then:
      - homeassistant.service:
          service: media_player.turn_on
          data:
            entity_id: media_player.denon_avr_x1800h_4
            
      - delay: 500ms
      
      - homeassistant.service:
          service: music_assistant.play_media
          data:
            entity_id: media_player.denon_avr_x1800h_4
            media_type: "playlist"
            media_id: !lambda |-
              int idx = id(g_pl_index);
              if (idx == 0) return std::string("Top Hits of 2021");
              if (idx == 1) return std::string("Top Hits of 2022");
              if (idx == 2) return std::string("Top Hits of 2023");
              if (idx == 3) return std::string("Top Hits of 2024");
              if (idx == 4) return std::string("Top Tracks of 2025 Global");
              if (idx == 5) return std::string("High Quality");
              if (idx == 6) return std::string("Energia");
              if (idx == 7) return std::string("Gute-Laune-Mix");
              if (idx == 8) return std::string("500 Random tracks (from library)");
              return std::string("");

  # Aktualisiert die Walzen-Auswahl im Display
  - id: pl_render
    then:
      - lambda: |-
          auto* roller_obj = (lv_obj_t*) id(my_playlist_roller).get_obj();
          int idx = id(g_pl_index);
          lv_roller_set_selected(roller_obj, idx, LV_ANIM_ON);

interval:
  # Navigation & Seitenwechsel
  - interval: 50ms
    then:
      - if:
          condition: { lambda: 'return id(g_nav_req) && id(g_base)==11;' }
          then:
            - lambda: 'id(g_nav_req) = false; id(g_knob_capture) = true; id(g_pl_lasttap) = id(g_tap_seq);'
            - lvgl.page.show: { id: page_playlists, animation: move_left, time: 250ms }
            - script.execute: pl_render
            
  # Knob-Steuerung: Drehen scrollt die Walze weiter
  - interval: 120ms
    then:
      - if:
          condition: { lambda: 'return id(g_base)==11 && id(g_knob_delta) != 0;' }
          then:
            - lambda: |-
                int next_idx = id(g_pl_index) + id(g_knob_delta);
                id(g_knob_delta) = 0;
                
                if (next_idx < 0) next_idx = 0;
                if (next_idx > id(g_pl_max)) next_idx = id(g_pl_max);
                
                id(g_pl_index) = next_idx;
            - script.execute: pl_render

      # Drücken des Knobs: Startet Musik
      - if:
          condition: { lambda: 'return id(g_base)==11 && id(g_tap_seq) != id(g_pl_lasttap);' }
          then:
            - lambda: 'id(g_pl_lasttap) = id(g_tap_seq);'
            - script.execute: pl_commit

# Das visuelle Layout in LVGL
lvgl:
  pages:
    - id: page_playlists
      bg_color: 0x0B0F19
      widgets:
        # Das native, runde-Display-freundliche Roller (Walzen) Widget
        - roller:
            id: my_playlist_roller
            align: CENTER
            width: 220
            # Zeigt standardmäßig 3 Zeilen gleichzeitig an (die aktive in der Mitte, groß)
            visible_row_count: 3 
            options:
              - "Top Hits 2021"
              - "Top Hits 2022"
              - "Top Hits 2023"
              - "Top Hits 2024"
              - "Top Tracks 2025"
              - "High Quality"
              - "Energia"
              - "Gute-Laune-Mix"
              - "500 Random"
