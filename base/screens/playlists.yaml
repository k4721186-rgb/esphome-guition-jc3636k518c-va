# Playlist-Auswahl-Screen im Design des Thermostat-Screens (Bogen-Layout)
esphome:
  on_boot:
    - priority: 655
      then:
        - lambda: 'id(g_present)[3] = true;' # Platz 3 im Karussell

globals:
  - id: g_bgpl_lasttap    
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_bgpl_target     
    type: float
    restore_value: yes
    initial_value: '1.0'
  - id: g_bgpl_min        
    type: float
    restore_value: no
    initial_value: '1.0'
  - id: g_bgpl_max        
    type: float
    restore_value: no
    initial_value: '9.0'
  - id: g_bgpl_step       
    type: float
    restore_value: no
    initial_value: '1.0'

script:
  # 1. Startet Denon & Music Assistant PLAYLIST SOFORT
  - id: bgpl_commit_instant
    mode: restart
    then:
      - homeassistant.action:
          action: media_player.turn_on
          data:
            entity_id: media_player.denon_avr_x1800h_4
      - delay: 500ms
      - homeassistant.action:
          action: music_assistant.play_media
          data:
            entity_id: media_player.denon_avr_x1800h_4
            media_type: "playlist"
            media_id: !lambda |-
              int idx = (int)id(g_bgpl_target);
              if (idx == 1) return std::string("Top Hits of 2021");
              if (idx == 2) return std::string("Top Hits of 2022");
              if (idx == 3) return std::string("Top Hits of 2023");
              if (idx == 4) return std::string("Top Hits of 2024");
              if (idx == 5) return std::string("Top Tracks of 2025 Global");
              if (idx == 6) return std::string("High Quality");
              if (idx == 7) return std::string("Energia");
              if (idx == 8) return std::string("Gute-Laune-Mix");
              if (idx == 9) return std::string("500 Random tracks (from library)");
              return std::string("");

  # 2. Triggert die Musik VERZÖGERT (2 Sekunden)
  - id: bgpl_commit_delayed
    mode: restart
    then:
      - delay: 2000ms
      - script.execute: bgpl_commit_instant

  # 3. Aktualisiert das Display
  - id: bgpl_render
    then:
      - lvgl.label.update:
          id: bgpl_bright_label
          text: !lambda |-
            int idx = (int)id(g_bgpl_target);
            if (idx == 1) return std::string("Top Hits 2021");
            if (idx == 2) return std::string("Top Hits 2022");
            if (idx == 3) return std::string("Top Hits 2023");
            if (idx == 4) return std::string("Top Hits 2024");
            if (idx == 5) return std::string("Top Tracks 2025");
            if (idx == 6) return std::string("High Quality");
            if (idx == 7) return std::string("Energia");
            if (idx == 8) return std::string("Gute-Laune-Mix");
            if (idx == 9) return std::string("500 Random");
            return std::string("--");
      - lvgl.label.update:
          id: bgpl_icon_label
          text: !lambda |-
            int idx = (int)id(g_bgpl_target);
            if (idx >= 1 && idx <= 5) return std::string("\U000f075a"); 
            if (idx == 6) return std::string("\U000f180d");             
            if (idx == 7) return std::string("\U000f0241");             
            if (idx == 8) return std::string("\U000f0196");             
            if (idx == 9) return std::string("\U000f049a");             
            return std::string("");
      - lvgl.arc.update:
          id: bgpl_bright_slider
          value: !lambda 'return (int)(100L * (id(g_bgpl_target) - 1) / 8);'

sensor: []
text_sensor: []

interval:
  # Navigation fängt Platz 3 im Karussell ab (Geändert auf page_favoriten)
  - interval: 50ms
    then:
      - if:
          condition: { lambda: 'return id(g_nav_req) && id(g_base)==3;' }
          then:
            - lambda: 'id(g_nav_req) = false; id(g_knob_capture) = true; id(g_bgpl_lasttap) = id(g_tap_seq);'
            - if: { condition: { lambda: 'return id(g_nav_anim)==0;' }, then: [lvgl.page.show: { id: page_favoriten, animation: move_left,   time: 250ms }] }
            - if: { condition: { lambda: 'return id(g_nav_anim)==1;' }, then: [lvgl.page.show: { id: page_favoriten, animation: move_right,  time: 250ms }] }
            - if: { condition: { lambda: 'return id(g_nav_anim)==2;' }, then: [lvgl.page.show: { id: page_favoriten, animation: move_top,    time: 250ms }] }
            - if: { condition: { lambda: 'return id(g_nav_anim)==3;' }, then: [lvgl.page.show: { id: page_favoriten, animation: move_bottom, time: 250ms }] }
            - script.execute: bgpl_render

  # Knob-Drehung
  - interval: 120ms
    then:
      - if:
          condition: { lambda: 'return id(g_base)==3 && id(g_knob_delta) != 0;' }
          then:
            - lambda: |-
                id(g_bgpl_target) += id(g_knob_delta) * id(g_bgpl_step);
                id(g_knob_delta) = 0;
                if (id(g_bgpl_target) < id(g_bgpl_min)) id(g_bgpl_target) = id(g_bgpl_min);
                if (id(g_bgpl_target) > id(g_bgpl_max)) id(g_bgpl_target) = id(g_bgpl_max);
            - script.execute: bgpl_commit_delayed
            - script.execute: bgpl_render

      # Klick
      - if:
          condition: { lambda: 'return id(g_base)==3 && id(g_tap_seq) != id(g_bgpl_lasttap);' }
          then:
            - lambda: 'id(g_bgpl_lasttap) = id(g_tap_seq);'
            - script.execute: bgpl_commit_instant

lvgl:
  pages:
    - id: page_favoriten
      bg_color: 0x0A0F19 
      widgets:
        - arc:
            id: bgpl_bright_slider
            align: CENTER
            width: 300
            height: 300
            arc_width: 12
            adjustable: false
            min_value: 0
            max_value: 100
            value: 0
            start_angle: 135
            end_angle: 45
            arc_color: 0x21304A
            indicator:
              arc_color: 0x38BDF8 
              arc_width: 12
              
        - label: { align: CENTER, y: -86, text: "FAVORITEN", text_font: font_artist, text_color: 0x38BDF8 }
        - label: { id: bgpl_icon_label, align: CENTER, y: -36, text: "", text_font: icons34, text_color: 0xFFFFFF }
        - label: { id: bgpl_bright_label, align: CENTER, y: 10, width: 260, text_align: CENTER, text: "--", text_font: montserrat_24, text_color: 0xFFFFFF }
        - label: { align: CENTER, y: 46, text: "Wählen...", text_font: montserrat_24, text_color: 0x9FC7BE }
        - label: { align: CENTER, y: 92, text: "Musik", text_font: font_artist, text_color: 0xCFEAE4 }
