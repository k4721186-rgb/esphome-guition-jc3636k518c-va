# Playlist-Auswahl-Screen im Design des Thermostat-Screens (Bogen-Layout)
esphome:
  on_boot:
    - priority: 655
      then:
        - lambda: 'id(g_present)[3] = true;' # Registriert diesen Screen auf Platz 3 im Karussell

globals:
  - id: g_cw_lasttap    
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_scene_target # Variable wiederverwendet, um Core-Kompatibilität zu wahren     
    type: float
    restore_value: yes
    initial_value: '1.0'
  - id: g_cw_min        
    type: float
    restore_value: no
    initial_value: '1.0'
  - id: g_cw_max        
    type: float
    restore_value: no
    initial_value: '9.0'
  - id: g_cw_step       
    type: float
    restore_value: no
    initial_value: '1.0'

script:
  # 1. Startet Denon & Music Assistant PLAYLIST SOFORT (wird vom Klick genutzt)
  - id: cw_commit_instant
    mode: restart
    then:
      - homeassistant.action:
          action: media_player.turn_on
          data:
            entity_id: media_player.denon_avr_x1800h_4
      - delay: 500ms
      - homeassistant.action:
          action: music_assistant.play_media
          data:
            entity_id: media_player.denon_avr_x1800h_4
            media_type: "playlist"
            media_id: !lambda |-
              int idx = (int)id(g_scene_target);
              if (idx == 1) return std::string("Top Hits of 2021");
              if (idx == 2) return std::string("Top Hits of 2022");
              if (idx == 3) return std::string("Top Hits of 2023");
              if (idx == 4) return std::string("Top Hits of 2024");
              if (idx == 5) return std::string("Top Tracks of 2025 Global");
              if (idx == 6) return std::string("High Quality");
              if (idx == 7) return std::string("Energia");
              if (idx == 8) return std::string("Gute-Laune-Mix");
              if (idx == 9) return std::string("500 Random tracks (from library)");
              return std::string("");

  # 2. Triggert die Musik VERZÖGERT (2 Sekunden Wartezeit nach dem Drehen)
  - id: cw_commit_brightness
    mode: restart
    then:
      - delay: 2000ms
      - script.execute: cw_commit_instant

  # 3. Aktualisiert das Display (Texte, Icons und den Bogen)
  - id: cw_render
    then:
      - lvgl.label.update:
          id: cw_bright_label
          text: !lambda |-
            int idx = (int)id(g_scene_target);
            if (idx == 1) return std::string("Top Hits 2021");
            if (idx == 2) return std::string("Top Hits 2022");
            if (idx == 3) return std::string("Top Hits 2023");
            if (idx == 4) return std::string("Top Hits 2024");
            if (idx == 5) return std::string("Top Tracks 2025");
            if (idx == 6) return std::string("High Quality");
            if (idx == 7) return std::string("Energia");
            if (idx == 8) return std::string("Gute-Laune-Mix");
            if (idx == 9) return std::string("500 Random");
            return std::string("--");
      - lvgl.label.update:
          id: cw_icon_label
          text: !lambda |-
            int idx = (int)id(g_scene_target);
            if (idx >= 1 && idx <= 5) return std::string("\U000f075a"); # Musiknote für die Jahreshits
            if (idx == 6) return std::string("\U000f180d");             # Audio-High-Res / Disc-Icon
            if (idx == 7) return std::string("\U000f0241");             # Blitz (Energia)
            if (idx == 8) return std::string("\U000f0196");             # Emoticon / Happy-Icon (Gute Laune)
            if (idx == 9) return std::string("\U000f049a");             # Shuffle / Random-Icon
            return std::string("");
      - lvgl.arc.update:
          id: cw_bright_slider
          value: !lambda 'return (int)(100L * (id(g_scene_target) - 1) / 8);'

sensor: []
text_sensor: []

interval:
  # Navigation fängt Platz 3 im Karussell ab (mit allen Richtungs-Animationen)
  - interval: 50ms
    then:
      - if:
          condition: { lambda: 'return id(g_nav_req) && id(g_base)==3;' }
          then:
            - lambda: 'id(g_nav_req) = false; id(g_knob_capture) = true; id(g_cw_lasttap) = id(g_tap_seq);'
            - if: { condition: { lambda: 'return id(g_nav_anim)==0;' }, then: [lvgl.page.show: { id: page_colorwheel, animation: move_left,   time: 250ms }] }
            - if: { condition: { lambda: 'return id(g_nav_anim)==1;' }, then: [lvgl.page.show: { id: page_colorwheel, animation: move_right,  time: 250ms }] }
            - if: { condition: { lambda: 'return id(g_nav_anim)==2;' }, then: [lvgl.page.show: { id: page_colorwheel, animation: move_top,    time: 250ms }] }
            - if: { condition: { lambda: 'return id(g_nav_anim)==3;' }, then: [lvgl.page.show: { id: page_colorwheel, animation: move_bottom, time: 250ms }] }
            - script.execute: cw_render

  # Knob-Drehung schaltet Playlists durch (Startet den 2-Sekunden-Timer bei jeder Rastung neu)
  - interval: 120ms
    then:
      - if:
          condition: { lambda: 'return id(g_base)==3 && id(g_knob_delta) != 0;' }
          then:
            - lambda: |-
                id(g_scene_target) += id(g_knob_delta) * id(g_cw_step);
                id(g_knob_delta) = 0;
                if (id(g_scene_target) < id(g_cw_min)) id(g_scene_target) = id(g_cw_min);
                if (id(g_scene_target) > id(g_cw_max)) id(g_scene_target) = id(g_cw_max);
            - script.execute: cw_commit_brightness
            - script.execute: cw_render

      # Klick startet die gewählte Musik SOFORT (überspringt den 2-Sekunden-Timer)
      - if:
          condition: { lambda: 'return id(g_base)==3 && id(g_tap_seq) != id(g_cw_lasttap);' }
          then:
            - lambda: 'id(g_cw_lasttap) = id(g_tap_seq);'
            - script.execute: cw_commit_instant

lvgl:
  pages:
    - id: page_colorwheel
      bg_color: 0x0A0F19 # Passendes, tiefes Musik-Dunkelblau
      widgets:
        # Der große, elegante Einstellungsbogen aus der Thermostat-Vorlage
        - arc:
            id: cw_bright_slider
            align: CENTER
            width: 300
            height: 300
            arc_width: 12
            adjustable: false
            min_value: 0
            max_value: 100
            value: 0
            start_angle: 135
            end_angle: 45
            arc_color: 0x21304A
            indicator:
              arc_color: 0x38BDF8 # Ein wunderschönes, helles Musik-Cyan für den Bogen
              arc_width: 12
              
        # Text-Layoutanordnung exakt analog zum Thermostat
        - label: { align: CENTER, y: -86, text: "PLAYLIST", text_font: font_artist, text_color: 0x38BDF8 }
        - label: { id: cw_icon_label, align: CENTER, y: -36, text: "", text_font: icons34, text_color: 0xFFFFFF }
        - label: { id: cw_bright_label, align: CENTER, y: 10, width: 260, text_align: CENTER, text: "--", text_font: montserrat_24, text_color: 0xFFFFFF }
        - label: { align: CENTER, y: 46, text: "Wählen...", text_font: font_med, text_color: 0x9FC7BE }
        - label: { align: CENTER, y: 92, text: "Musik", text_font: font_artist, text_color: 0xCFEAE4 }
